<!DOCTYPE html>
<html>
    <body>
        
        <script>
        /*
        window.screen
        or screen simply
        screen.width
        screen.height

        screen.availWidth = width = Interface features
        screen.availheight = height = Interface features like taskbar

        screen.colorDepth
        screen.pixelWidth
        Returns the number of bits used to display one color.
        All modern computers use 24 bit or 32 bit for color resolution
       */

        document.write(screen.width + " | "+screen.height+"<br>");
        document.write(window.screen.availWidth + " | " + window.screen.availHeight+"<br>");

        document.write(window.screen.colorDepth+ " | " +window.screen.pixelDepth);

        </script>

    </body>
</html>
