<!DOCTYPE html>
<html>
    <body>
    


    <script>
    /*
    window.setTimeout() or setTimeout()
    clearTimeout()

    setInterval()
    clearInterval()
    */
    
    var greetings = window.setTimeout(greet, 2000);
    clearTimeout(greetings);

    function greet()
    {
        alert("Welcome to my page!");
    }

    var count = 0;
    var countValue= setInterval(msg, 1000);

    function msg()
    {
        count = count +1;
        document.write(count);
        if(count==4)
        {
            clearTimeout(countValue);
        }
    }
    </script>
    
    </body>
</html>
